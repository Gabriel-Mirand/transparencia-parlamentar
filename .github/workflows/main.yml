name: Coletor de Dados Deputados

# Define quando o código será executado
on:
  schedule:
    # Roda todos os dias às 07:20 UTC (04:20 da manhã no horário de Brasília)
    - cron: '20 7 * * *'
  workflow_dispatch: # Permite que você clique em um botão no GitHub para rodar agora

jobs:
  executar_coletor:
    runs-on: ubuntu-22.04

    steps:
      # 1. Baixa o seu código do repositório para a máquina virtual
      - name: Checkout do Código
        uses: actions/checkout@v3

      # 2. Instala o Python na máquina virtual
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Instala as bibliotecas necessárias
      - name: Instalar Dependências
        run: |
          pip install requests psycopg2-binary python-dotenv schedule

      # 4. Executa o seu script Python injetando as credenciais do Supabase
      - name: Rodar Script de Coleta
        env:
          # O GitHub busca esses valores nos "Secrets" que você cadastrou nas Settings
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python coletor.py 
